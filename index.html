<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지족고등학교 대시보드</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 날짜 이동 버튼을 위한 간단한 스타일 추가 */
        .date-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .date-btn {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .date-btn:hover {
            background: #f8fafc;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <div class="date-container">
            <button id="prevDateBtn" class="date-btn">◀</button>
            <h1 id="today">날짜 불러오는 중...</h1>
            <button id="nextDateBtn" class="date-btn">▶</button>
        </div>
    </header>

    <main class="grid">
        <section class="card">
            <div class="card-title">
                <h2>📚 선택 날짜 시간표</h2>
            </div>
            <div class="selector">
                <label>학년</label>
                <select id="grade">
                    <option value="1">1학년</option>
                    <option value="2" selected>2학년</option>
                    <option value="3">3학년</option>
                </select>

                <label>반</label>
                <select id="class">
                    <option value="1">1반</option>
                    <option value="2">2반</option>
                    <option value="3" selected>3반</option>
                    <option value="4">4반</option>
                    <option value="5">5반</option>
                    <option value="6">6반</option>
                    <option value="7">7반</option>
                    <option value="8">8반</option>
                    <option value="9">9반</option>
                    <option value="10">10반</option>
                    <option value="11">11반</option>
                </select>
                <button id="loadBtn">조회</button>
            </div>
            <div id="timetable">
                <div class="loading">시간표를 불러오는 중...</div>
            </div>
        </section>

        <section class="card">
            <div class="card-title">
                <h2>🍱 선택 날짜 급식</h2>
            </div>
            <div id="meal">
                <div class="loading">급식을 불러오는 중...</div>
            </div>
        </section>

        <section class="card">
            <div class="card-title">
                <h2>✅ 오늘 할 일</h2>
            </div>
            <div class="todo-input">
                <input id="todoText" type="text" placeholder="할 일을 입력하세요">
                <button id="addTodo">추가</button>
            </div>
            <div id="todoList"></div>
        </section>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
